name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "api/**"
      - "web/**"
      - "functions/**"
      - "infra/**"
      - "docs/**"
      - ".github/**"
      - "README.md"
  merge_group:
    branches: [main]

jobs:
  test-api-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest "moto[dynamodb,s3]" httpx
          python -m pytest tests/ --ignore=tests/integration -v

  test-functions-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test
        run: |
          cd functions
          pip install -r requirements-dev.txt
          pip install -r requirements.txt
          python -m pytest tests/ --ignore=tests/integration -v

  test-web-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install and test
        run: |
          cd web
          pnpm install --frozen-lockfile
          pnpm test

  test-integration:
    runs-on: ubuntu-latest
    services:
      dynamodb:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest "moto[dynamodb,s3]" httpx
          cd ../functions
          pip install -r requirements-dev.txt
          pip install -r requirements.txt

      - name: API integration tests
        run: cd api && python -m pytest tests/integration/ -v

      - name: Lambda integration tests
        run: cd functions && python -m pytest tests/integration/ -v

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build and check
        run: |
          cd web
          pnpm install --frozen-lockfile
          pnpm build
          pnpm check
