name: Deploy API Docs

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install fastapi pydantic python-ulid python-dateutil boto3 mangum

      - name: Generate OpenAPI spec
        run: cd api && python generate_openapi.py ../docs/openapi.json
        env:
          DYNAMODB_ENDPOINT: http://localhost:8000
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_DEFAULT_REGION: ap-northeast-1

      # Jekyll で docs/db/ を HTML 化 (tbls 出力 Markdown と手書き補足を Pages 上で読める形に)
      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs/db
          destination: ./_jekyll_db

      # 既存 docs/ (Swagger UI + openapi.json + architecture.*) と Jekyll 出力をマージ
      - name: Merge Pages content
        run: |
          mkdir -p _site
          cp -r docs/. _site/
          rm -rf _site/db
          cp -r _jekyll_db _site/db

      - uses: actions/upload-pages-artifact@v3
        # path はデフォルト ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
