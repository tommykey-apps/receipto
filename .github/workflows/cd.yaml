name: CD

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "functions/**"
      - "web/**"
      - "infra/**"
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-1

permissions:
  contents: read

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Apply
        run: |
          cd infra
          terraform init
          terraform apply -input=false -auto-approve
        env:
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

  deploy-api:
    needs: deploy-infra
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Package API Lambda
        run: |
          cd api
          pip install -r requirements.txt -t package/
          cp -r *.py routers/ store/ models/ package/
          cd package && zip -r9 ../lambda.zip . -q

      - name: Deploy API Lambda
        run: |
          aws lambda update-function-code \
            --function-name expense-tracker-api \
            --zip-file fileb://api/lambda.zip

      - name: Package Digest Lambda
        run: |
          cd functions
          zip -r9 ../digest.zip digest_generator.py

      - name: Deploy Digest Lambda
        run: |
          aws lambda update-function-code \
            --function-name expense-tracker-digest \
            --zip-file fileb://digest.zip

      - name: Package Pipeline Lambdas
        run: |
          cd functions
          pip install boto3 python-ulid python-dateutil typing_extensions -t package/
          cp *.py package/
          cd package && zip -r9 ../pipeline.zip . -q

      - name: Deploy Pipeline Lambdas
        run: |
          for fn in receipt-validator ocr-processor categorizer expense-saver budget-checker notifier; do
            aws lambda update-function-code \
              --function-name expense-tracker-$fn \
              --zip-file fileb://functions/pipeline.zip
          done

  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build SvelteKit
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
        run: |
          cd web
          pnpm install --frozen-lockfile
          pnpm build

      - name: Deploy to S3
        run: aws s3 sync web/build/ s3://${{ secrets.FRONTEND_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
