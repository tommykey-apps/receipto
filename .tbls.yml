# tbls configuration for DynamoDB schema documentation.
#
# IMPORTANT: tbls の DynamoDB driver は DSN クエリの endpoint パラメータを認識しない。
# DynamoDB Local に接続するには AWS_ENDPOINT_URL=http://localhost:8000 を環境変数で
# 併用すること。Makefile の `db-docs` ターゲット経由で実行するのが正規の手順。
#
# `tbls doc` を素手で打つと AWS 本番に誤接続する可能性があるため、必ず `make db-docs`
# を使うこと。詳細は docs/db/README.md。

dsn: dynamo://ap-northeast-1?aws_access_key_id=local&aws_secret_access_key=local

docPath: docs/db/schema

format:
  adjust: true
  sort: false

include:
  - expense-tracker

# tbls の DynamoDB driver は DescribeTable の AttributeDefinitions しかカラム化しない。
# このテーブルは pk と sk の2属性しか宣言されていないため、自動生成されるカラム表は
# 2行だけになる。実アイテムの属性 (amount, category, created_at 等) は出力されない。
# よって意味のある補足は以下の comments と、docs/db/entities.md / access-patterns.md
# (手書き) に書く。
comments:
  - table: expense-tracker
    tableComment: |
      Single-table design. 6 logical entities (User / Expense / Receipt / Category /
      Budget / MonthlySummary) are stored under different SK prefixes.
      See ../entities.md and ../access-patterns.md for full attribute definitions
      (tbls cannot infer non-key attributes from DynamoDB).
    columnComments:
      pk: |
        Partition key. Always `USER#{cognito_sub}` — every item belongs to exactly one user.
      sk: |
        Sort key. Prefix determines the entity type:
          EXP#{ISO8601}#{id}        Expense
          RCV#{id}                  Receipt
          CAT#{name}                Category
          BDG#{YYYY-MM}#{category}  Budget
          SUM#{YYYY-MM}             MonthlySummary
